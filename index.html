<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Veiling Kijkdagen</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="styles.css?v=14">
  </head>
  <body>
    <main class="shell">
      <section class="control-band" aria-label="Filters">
        <div class="title-block">
          <img class="title-image title-image-wide" src="viewings-today-wide-transparent.png" alt="Viewings.today">
        </div>
        <div class="week-picker" role="group" aria-labelledby="weekPickerLabel">
          <span id="weekPickerLabel">Alle veiling-kijkdagen in deze week</span>
          <div class="week-control">
            <button id="prevWeekButton" class="week-step" type="button" aria-label="Vorige week" title="Vorige week">&#8249;</button>
            <button id="weekDisplayButton" class="week-display" type="button" aria-live="polite">
              <span id="weekRangeText"></span>
            </button>
            <input id="weekInput" type="hidden">
            <button id="nextWeekButton" class="week-step" type="button" aria-label="Volgende week" title="Volgende week">&#8250;</button>
          </div>
          <span id="weekError" class="week-error" role="alert"></span>
        </div>
      </section>

      <section id="setupNotice" class="notice hidden">
        <strong>Supabase nog niet ingesteld.</strong>
        Vul je project-url en anon key in via de instellingen hieronder.
      </section>

      <section class="config-panel" aria-label="Supabase instellingen">
        <details>
          <summary>Supabase instellingen</summary>
          <form id="configForm" class="config-grid">
            <label>
              <span>Project URL</span>
              <input id="supabaseUrl" type="url" placeholder="https://jouw-project.supabase.co">
            </label>
            <label>
              <span>Anon key</span>
              <input id="supabaseKey" type="password" placeholder="eyJ...">
            </label>
            <button type="submit">Opslaan</button>
          </form>
        </details>
      </section>

      <section class="content-grid">
        <div class="map-wrap">
          <div id="map" aria-label="Kaart met veilinghuizen"></div>
        </div>

        <aside class="list-panel" aria-label="Lijst met veilinghuizen">
          <div class="list-head">
            <h2>Veilinghuizen</h2>
            <span id="resultCount">0</span>
          </div>
          <div id="houseList" class="house-list"></div>
        </aside>
      </section>
    </main>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="shared.js?v=2"></script>
    <script src="app.js?v=4"></script>
  </body>
</html>
